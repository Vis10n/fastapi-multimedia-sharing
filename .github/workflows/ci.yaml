name: Run Tests (Pytest with uv)

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure uv is installed
        run: |
          if ! command -v uv &> /dev/null
          then
            curl -Ls https://astral.sh/uv/install.sh | sh
          fi

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest
